version: '3.8'

services:
  # Development service
  sapom-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: sapom-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: pnpm dev --host
    restart: unless-stopped
    profiles:
      - dev

  # Production service
  sapom-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sapom-prod
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    profiles:
      - prod
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

networks:
  default:
    name: sapom-network
